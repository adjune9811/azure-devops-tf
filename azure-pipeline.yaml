trigger:
  branches:
    include:
      - main

variables:
  terraformVersion: '1.9.0'
  backendRG: 'tfstate-rg'
  backendSA: 'addstfstatestore123'
  backendContainer: 'tfstate'

stages:

# ── Validate ─────────────────────────────
- stage: Validate
  displayName: 'Validate'
  jobs:
  - job: Validate
    pool:
      name: Default
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: 'tf init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'sc-prod'
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendSA)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: 'prod.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: 'tf validate'
      inputs:
        provider: 'azurerm'
        command: 'validate'

# ── PROD Plan ────────────────────────────
- stage: Prod_Plan
  displayName: 'PROD - Plan'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: Plan
    pool:
      name: Default
    steps:
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    - task: TerraformTaskV4@4
      displayName: 'tf init'
      inputs:
        provider: 'azurerm'
        command: 'init'
        backendServiceArm: 'sc-prod'
        backendAzureRmResourceGroupName: $(backendRG)
        backendAzureRmStorageAccountName: $(backendSA)
        backendAzureRmContainerName: $(backendContainer)
        backendAzureRmKey: 'prod.terraform.tfstate'

    - task: TerraformTaskV4@4
      displayName: 'tf plan'
      inputs:
        provider: 'azurerm'
        command: 'plan'
        environmentServiceNameAzureRM: 'sc-prod'
        commandOptions: -var-file=envs/prod.tfvars -out=tfplan-prod

    - publish: $(System.DefaultWorkingDirectory)/tfplan-prod
      artifact: tfplan-prod

# ── PROD Deploy ──────────────────────────
- stage: Prod_Deploy
  displayName: 'PROD - Deploy'
  dependsOn: Prod_Plan
  condition: succeeded()
  jobs:
  - deployment: Deploy
    pool:
      name: Default
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: 'tf init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'sc-prod'
              backendAzureRmResourceGroupName: $(backendRG)
              backendAzureRmStorageAccountName: $(backendSA)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: 'prod.terraform.tfstate'

          - download: current
            artifact: tfplan-prod

          - task: TerraformTaskV4@4
            displayName: 'tf apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              environmentServiceNameAzureRM: 'sc-prod'
              commandOptions: $(Pipeline.Workspace)/tfplan-prod/tfplan-prod